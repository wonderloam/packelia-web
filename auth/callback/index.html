<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Packelia</title>
  <meta name="description" content="Complete your sign-in to Packelia.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="container">
    <img src="/assets/logo.png" alt="Packelia" class="logo">
    <div class="card">
      <h1>Sign in to Packelia</h1>
      <p class="description">
        To complete sign-in, open the link in Packelia.
      </p>
      <a id="continue-button" class="continue-button" href="#">
        Continue in Packelia
      </a>
      <div id="divider" class="divider">
        <span>or install the app</span>
      </div>
      <div class="store-badges">
        <a href="https://apps.apple.com/app/packelia/id_APPSTORE_ID">
          <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.wonderloam.packelia">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
        </a>
      </div>
      <p class="note">
        Already have the app? Tap the link in your email again after installing.
      </p>
    </div>

    <script>
      (function () {
        var search = window.location.search;
        var params = new URLSearchParams(search);
        var code = params.get('code');
        if (!code) return;
        var btn = document.getElementById('continue-button');
        btn.href = 'packelia://auth/callback?code=' + encodeURIComponent(code);
        btn.classList.add('visible');
        document.getElementById('divider').classList.add('visible');
      })();
    </script>
    <footer>
      <a href="/privacy.html">Privacy</a>
      &nbsp;·&nbsp;
      <a href="mailto:support@wonderloam.com">Support</a>
    </footer>
  </div>
</body>
</html>
